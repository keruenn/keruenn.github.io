baseURL = 'https://keruenn.github.io/'
languageCode = 'en-us'
title = 'security research'
theme = 'PaperMod'

# Syntax highlighting settings
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = true
    lineNumbersInTable = true
    style = "monokai"

# Enable taxonomies for tags and categories
[taxonomies]
  tag = "tags"
  category = "categories"

# Main menu configuration
[menu]
  # Posts page menu item
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 5
  
  # About page menu item
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  
  # Tags page menu item  
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

# PaperMod theme specific settings
[params]
  # Site description
  description = "A blog about security research, CTFs, and vulnerabilities"
  
  # Home info section

  
  # Display settings
  displayFullLangName = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowTags = true
  
  # Hide generator info
  disableHugoGeneratorInject = true
  
  # Content settings
  showtoc = true
  tocopen = false
  hideSummary = false
  
  # Date format
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  
  # Post cover settings
  [params.cover]
    linkFullImages = true
    responsiveImages = true
  
  # Assets settings
  [params.assets]
    favicon = ""
    disableHLJS = false
  
  # Add your social media links
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"  # Replace with your GitHub URL
  
  [[params.socialIcons]]
    name = "email"
    url = "mailto:your.email@example.com"  # Replace with your email

  # Custom footer text (optional)
  [params.footer]
    trademark = true
    author = true
    topText = []
    bottomText = []

  # Search settings
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# Enable search functionality
[outputs]
  home = ["HTML", "RSS", "JSON"]